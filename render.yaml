services:
  - type: web
    name: mobilador-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PUBLIC_URL
        value: https://mobilador-api.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: mobilador-db
          property: connectionString

databases:
  - type: postgres
    name: mobilador-db
    ipAllowList: []
