services:
  - type: web
    name: mobilador-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mobilador-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: mobilador-db
    plan: free
    databaseName: mobilador
    user: mobilador
